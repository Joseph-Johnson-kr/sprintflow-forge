modules:
  jira:backlogAction:
    - key: sprintflow-backlog-action
      resource: main
      resolver:
        function: resolver
      viewportSize: max
      title: Team Tools
      actions:
        - key: sprintflow
          title: SprintFlow
        - key: epic-planning
          title: Epic Planning
        - key: backlog-assistant
          title: Backlog Assistant
  function:
    - key: resolver
      handler: index.handler
resources:
  - key: main
    path: static/sprintflow/build
    tunnel:
      port: 5173
permissions:
  scopes:
    - storage:app
    - read:jira-work
    - write:jira-work
    - write:issue-link:jira
    - read:jira-user
    - read:board-scope:jira-software
    - read:board-scope.admin:jira-software
    - read:project:jira
    - read:issue-details:jira
    - read:sprint:jira-software
    - read:jql:jira
    - read:account
app:
  runtime:
    name: nodejs24.x
  id: ari:cloud:ecosystem::app/bb41e024-9ba1-4e43-9170-d27b4f468c7e
